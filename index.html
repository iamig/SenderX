<script src='https://code.jquery.com/jquery-2.2.4.min.js'></script>
<script>

    $(document).ready(function(){
        setInputFilter(document.getElementById("mobile"), function(value) {
            return /^\d*\d*$/.test(value); 
        });
    })
    
    $("#sendBut").click(function(){
        
        var senderName  = $("#name").val();
        var sendTo      = $("#mobile").val();
        var senderText  = $("#txt").val();
        
        if(senderName != '' && sendTo != '' && senderText != '') {

            $("#sendAlert").fadeOut();

            $.ajax({
                url: "send.php",
                dataType: "json",
                type: "POST",
                data: {
                    act: "send",
                    name: senderName,
                    to: sendTo,
                    text: senderText
                },
                beforeSend: () => {
                    $("#sendBut").prop("disabled", true).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>იგზავნება...');
                },
                success: (data) => {
                    $("#sendBut").prop("disabled", false).html('გაგზავნა');

                    $("#sendAlert").removeClass("alert-warning").addClass("alert-success").fadeIn().html("შეტყობინება წარმატებით გაიგზავნა! -0.104₾");

                    setTimeout(() => {
                        $("#sendAlert").fadeOut()
                    }, 2000)
                    
                }
            })
        }else{

            $("#sendAlert").fadeIn().html("შეავსეთ ყველა ველი!");

        }
    })


function setInputFilter(textbox, inputFilter) {
    ["input", "keydown", "keyup", "mousedown", "mouseup", "select", "contextmenu", "drop"].forEach(function(event) {
        textbox.addEventListener(event, function() {
        if (inputFilter(this.value)) {
            this.oldValue = this.value;
            this.oldSelectionStart = this.selectionStart;
            this.oldSelectionEnd = this.selectionEnd;
        } else if (this.hasOwnProperty("oldValue")) {
            this.value = this.oldValue;
            this.setSelectionRange(this.oldSelectionStart, this.oldSelectionEnd);
        } else {
            this.value = "";
        }
        });
    });
}

</script>
